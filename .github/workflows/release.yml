name: Publish release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish (for example, 0.1.0)
        required: true
        default: 0.1.0
        type: string
      prerelease:
        description: Mark the GitHub Release as a prerelease
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: publish-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ matrix.platform }} release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            os: macos-latest
          - platform: Windows
            os: windows-latest
          - platform: Linux
            os: ubuntu-24.04

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      # Write version config to a file so Windows shells cannot strip JSON quotes.
      - name: Write release version config
        env:
          SIFTLANE_VERSION: ${{ inputs.version }}
        run: |
          node -e 'require("fs").writeFileSync("tauri.release.json", JSON.stringify({ version: process.env.SIFTLANE_VERSION }))'

      # Generate notes ourselves and pass as releaseBody so both the GitHub Release
      # page and latest.json (in-app updater) get the same commits/PRs changelog.
      # generateReleaseNotes alone only fills the GitHub Release body — tauri-action
      # copies the releaseBody input into latest.json notes, not the generated body.
      - name: Generate release notes
        id: notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          NOTES="$(gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="v${VERSION}" \
            -f target_commitish="${GITHUB_SHA}" \
            --jq .body)"
          {
            echo "body<<SIFTLANE_NOTES_EOF"
            printf '%s\n' "$NOTES"
            echo "SIFTLANE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and publish bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ inputs.version }}
          releaseName: Siftlane v${{ inputs.version }}
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: ${{ inputs.prerelease }}
          includeUpdaterJson: true
          args: --config tauri.release.json
