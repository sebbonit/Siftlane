name: Publish release
run-name: >-
  Publish ${{
    inputs.bump == 'custom' && format('v{0}', inputs.version)
    || format('{0} (from latest release)', inputs.bump)
  }}${{ inputs.prerelease && ' · prerelease' || '' }}

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Next version relative to the latest GitHub release (patch = 0.2.3 → 0.2.4)
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - custom
        default: patch
      version:
        description: Exact version when bump is custom (e.g. 0.3.0). Leave empty for patch/minor/major.
        required: false
        type: string
        default: ""
      prerelease:
        description: Mark the GitHub Release as a prerelease
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  resolve-version:
    name: Resolve next version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
      previous: ${{ steps.resolve.outputs.previous }}
    steps:
      - name: Resolve version from latest release
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          BUMP: ${{ inputs.bump }}
          CUSTOM_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          latest_tag="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name 2>/dev/null || true)"
          if [ -z "${latest_tag}" ] || [ "${latest_tag}" = "null" ]; then
            latest_tag="$(gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=1" --jq '.[0].tag_name // empty' 2>/dev/null || true)"
          fi
          previous="${latest_tag#v}"
          if [ -z "${previous}" ]; then
            previous="0.0.0"
          fi

          if [ "${BUMP}" = "custom" ]; then
            version="${CUSTOM_VERSION}"
            if [ -z "${version}" ]; then
              echo "::error::Custom bump requires an exact version input (for example 0.3.0)."
              exit 1
            fi
          else
            base="${previous%%[-+]*}"
            IFS=. read -r major minor patch <<< "${base}"
            major="${major:-0}"
            minor="${minor:-0}"
            patch="${patch:-0}"

            case "${BUMP}" in
              patch)
                patch=$((patch + 1))
                ;;
              minor)
                minor=$((minor + 1))
                patch=0
                ;;
              major)
                major=$((major + 1))
                minor=0
                patch=0
                ;;
              *)
                echo "::error::Unknown bump type: ${BUMP}"
                exit 1
                ;;
            esac
            version="${major}.${minor}.${patch}"
          fi

          if ! [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-].+)?$ ]]; then
            echo "::error::Invalid version '${version}'. Expected semver like 0.2.4."
            exit 1
          fi

          tag="v${version}"
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::Tag ${tag} already exists. Choose a different bump or custom version."
            exit 1
          fi

          {
            echo "version=${version}"
            echo "tag=${tag}"
            echo "previous=${previous}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "## Release version"
            echo ""
            echo "- Previous release: \`v${previous}\`"
            echo "- Bump: \`${BUMP}\`"
            echo "- Publishing: **${tag}**"
          } >> "${GITHUB_STEP_SUMMARY}"

          echo "Resolved ${tag} (previous v${previous}, bump=${BUMP})"

  publish:
    name: Publish ${{ matrix.platform }} ${{ needs.resolve-version.outputs.tag }}
    needs: resolve-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            os: macos-latest
          - platform: Windows
            os: windows-latest
          - platform: Linux
            os: ubuntu-24.04

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      # Write version config to a file so Windows shells cannot strip JSON quotes.
      - name: Write release version config
        env:
          SIFTLANE_VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          node -e 'require("fs").writeFileSync("tauri.release.json", JSON.stringify({ version: process.env.SIFTLANE_VERSION }))'

      # Generate notes ourselves and pass as releaseBody so both the GitHub Release
      # page and latest.json (in-app updater) get the same commits/PRs changelog.
      # generateReleaseNotes alone only fills the GitHub Release body — tauri-action
      # copies the releaseBody input into latest.json notes, not the generated body.
      - name: Generate release notes
        id: notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.resolve-version.outputs.version }}
          PREVIOUS: ${{ needs.resolve-version.outputs.previous }}
        run: |
          ARGS=(-f "tag_name=v${VERSION}" -f "target_commitish=${GITHUB_SHA}")
          if [ "${PREVIOUS}" != "0.0.0" ]; then
            ARGS+=(-f "previous_tag_name=v${PREVIOUS}")
          fi
          NOTES="$(gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            "${ARGS[@]}" \
            --jq .body)"
          {
            echo "body<<SIFTLANE_NOTES_EOF"
            printf '%s\n' "$NOTES"
            echo "SIFTLANE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and publish bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.resolve-version.outputs.tag }}
          releaseName: Siftlane ${{ needs.resolve-version.outputs.tag }}
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: ${{ inputs.prerelease }}
          includeUpdaterJson: true
          args: --config tauri.release.json
